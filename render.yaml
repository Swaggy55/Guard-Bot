services:
  - type: web
    name: aegis-protection-bot
    runtime: node
    buildCommand: npm install --ignore-scripts
    startCommand: node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
    autoDeploy: true
